[agent]
name = "ai-maestro-webdesign"
description = "Consolidated web-design role — design judgment (Claude Design principles), ASCII sketch/parse, diagrams, infographics, style extraction, design.md authoring/audit, and browser-verified preview. The main agent orchestrates every amw-* sub-skill; amw-dev-browser is the only browser-automation primitive for input workflows."
role = "ai-maestro-webdesign"
main_agent = "ai-maestro-webdesign-main-agent"
model = "opus"
prefix = "amw-"
compatible-titles = ["MEMBER"]
compatible-clients = ["claude-code"]

[agent.persona]
title = "Web Designer"
governance_title = "member"
scope = "per-team"
responsibilities = [
    "Design and deliver web UI outcomes from general requirements — landing pages, dashboards, mockups, design systems, infographics",
    "Apply and enforce the Claude Design principles (amw-design-principles orchestrates every sub-skill)",
    "Author, audit, and round-trip design.md contracts (extract, convert, spec, drift-audit)",
    "Sketch and parse ASCII wireframes; produce diagrams (SVG, Mermaid, HTML, Excalidraw) and infographics",
    "Extract and remix visual styles from references; grade and battle-test design candidates",
    "Verify rendered output in a real browser through the amw-dev-browser primitive (screenshots, DOM, interaction)",
    "Report results to the team through the CHIEF-OF-STAFF (MEMBER communication graph)",
]

[agent.capabilities]
design_judgment = true
design_md_contracts = true
ascii_wireframing = true
diagram_generation = true
infographics = true
style_extraction = true
browser_preview_verification = true
ui_sound_design = true

[agent.skills]
bundled = [
    "amw-ascii-creator",
    "amw-ascii-diagrams-reference",
    "amw-ascii-pixel-art",
    "amw-ascii-sketch",
    "amw-ascii-to-html",
    "amw-ascii-to-svg",
    "amw-ascii-validator",
    "amw-box-diagram",
    "amw-design-battle",
    "amw-design-drift-audit",
