<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>iOS Frame — iPhone device-frame scaffold</title>
<style>
  /* Canonical theme tokens — tweaks-block.html writes to these.
     Defaults match pre-refactor hardcoded values so rendering is unchanged.
     Device-spec values stay hardcoded: iPhone 54px bezel corner, 42px screen
     corner, Dynamic Island 124×36, 390×844 device size, Home Indicator 134×5. */
  :root {
    --primary: #D97757;
    --text: #555;
    --bg: #fafaf7;
    --radius: 14px;
    --font-size: 15px;
  }

  body { margin: 0; background: #e8e8e3; font-family: ui-sans-serif, system-ui; min-height: 100vh; display: grid; place-items: center; padding: 40px; }

  /* iPhone 16 Pro proportions (uniform scale) */
  .iphone {
    --w: 390px;
    --h: 844px;
    width: var(--w); height: var(--h);
    background: #000;
    border-radius: 54px;
    padding: 12px;
    box-sizing: border-box;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255,255,255,.08) inset,
      0 30px 60px -20px rgba(0,0,0,.5),
      0 20px 40px -15px rgba(0,0,0,.3);
  }

  /* Screen — themeable surface bg flows from --bg */
  .screen {
    width: 100%; height: 100%;
    background: var(--bg);
    border-radius: 42px;
    overflow: hidden;
    position: relative;
  }

  /* Dynamic Island */
  .island {
    position: absolute;
    top: 11px;
    left: 50%;
    transform: translateX(-50%);
    width: 124px; height: 36px;
    background: #000;
    border-radius: 20px;
    z-index: 50;
  }

  /* Status bar */
  .status-bar {
    height: 54px;
    padding: 0 32px 0 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 17px;
    font-weight: 600;
    color: #000;
  }
  .status-right { display: flex; gap: 6px; align-items: center; font-size: 15px; }
  .status-right svg { width: 16px; height: 16px; }

  /* Content area */
  .content {
    padding: 16px 24px;
    height: calc(100% - 54px - 34px); /* minus status bar + home indicator */
    overflow-y: auto;
  }

  /* Home Indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px; height: 5px;
    background: #000;
    border-radius: 3px;
    opacity: .9;
  }

  /* Demo content — body p color+size flow from --text/--font-size, cards use --radius.
     h1 stays device-spec (iOS large-title scale), .card span stays 14px (mobile floor). */
  .content h1 { font-size: 34px; letter-spacing: -0.02em; margin: 16px 0 8px; }
  .content p  { font-size: var(--font-size); color: var(--text); margin: 0 0 24px; line-height: 1.5; }
  .content .card {
    background: white; border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.04);
  }
  .content .card strong { display: block; margin-bottom: 4px; }
  /* 14px = design-principles mobile body minimum (14px / 44x44 hit target). */
  .content .card span   { font-size: 14px; color: #777; }
</style>
</head>
<body>

<div class="iphone">
  <div class="screen">
    <div class="island"></div>

    <div class="status-bar">
      <span>9:41</span>
      <div class="status-right">
        <svg viewBox="0 0 16 10" fill="currentColor"><path d="M1 8h2v2H1zM5 6h2v4H5zM9 3h2v7H9zM13 0h2v10h-2z"/></svg>
        <svg viewBox="0 0 16 12" fill="currentColor"><path d="M8 2C4.5 2 1.8 4 0 6l1.5 1.5C3 6 5.3 4.5 8 4.5S13 6 14.5 7.5L16 6c-1.8-2-4.5-4-8-4zm0 3C5.5 5 3.5 6 2 7.5L3.5 9C4.5 8 6 7 8 7s3.5 1 4.5 2L14 7.5C12.5 6 10.5 5 8 5zm0 3c-1 0-2 .5-2.5 1L8 12l2.5-2.5c-.5-.5-1.5-1-2.5-1z"/></svg>
        <svg viewBox="0 0 24 12"><rect x="1" y="1" width="20" height="10" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="3" y="3" width="16" height="6" rx="1" fill="currentColor"/></svg>
      </div>
    </div>

    <div class="content">
      <h1>iPhone content area</h1>
      <p>Drop your app design here. Status bar, Dynamic Island, and Home Indicator are pre-built.</p>

      <div class="card"><strong>Card title</strong><span>Supporting copy</span></div>
      <div class="card"><strong>Item two</strong><span>List-style demo</span></div>
      <div class="card"><strong>Item three</strong><span>Replace with any content</span></div>
    </div>

    <div class="home-indicator"></div>
  </div>
</div>

</body>
</html>
